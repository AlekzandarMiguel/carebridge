    <path d="M25 63.5C36.2 73.6 55.6 74.1 70.2 58.6" stroke="white" stroke-opacity="0.82" stroke-width="4.4" stroke-linecap="round"/>
    <path d="M69.2 58.8L66.4 69.2" stroke="white" stroke-opacity="0.82" stroke-width="4.4" stroke-linecap="round"/>
  </g>

  <text x="102" y="55" fill="url(#wordGradient)" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="0">
    Care<tspan fill="#0891B2">Bridge</tspan>
